<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Ruleta con Desafíos - Onlyne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Juego de Ruleta con Desafíos</h1>
        <p>¡Gira la ruleta y enfrenta un desafío divertido!</p>
        <div class="ruleta-container">
            <div class="ruleta" id="ruleta">
                <div class="seccion" style="--i:1;">Baila como pollo</div>
                <div class="seccion" style="--i:2;">Canta opereta</div>
                <div class="seccion" style="--i:3;">10 saltos rana</div>
                <div class="seccion" style="--i:4;">Chiste malo</div>
                <div class="seccion" style="--i:5;">Imita animal</div>
                <div class="seccion" style="--i:6;">Otro idioma</div>
                <div class="seccion" style="--i:7;">Pose ridícula</div>
                <div class="seccion" style="--i:8;">Grita rey mundo</div>
                <div class="seccion" style="--i:9;">Baile loco</div>
                <div class="seccion" style="--i:10;">Cara graciosa</div>
                <div class="seccion" style="--i:11;">Salto estrella</div>
                <div class="seccion" style="--i:12;">Risa falsa</div>
            </div>
            <div class="puntero"></div>
        </div>
        <button id="girar">¡Girar Ruleta!</button>
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
