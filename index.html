<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Ruleta con Desafíos - Onlyne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Juego de Ruleta con Desafíos</h1>
        <p>¡Gira la ruleta y enfrenta un desafío divertido!</p>
        <div class="ruleta-container">
            <div class="ruleta" id="ruleta">
                <div class="seccion" style="--i:1;">Desafío 1</div>
                <div class="seccion" style="--i:2;">Desafío 2</div>
                <div class="seccion" style="--i:3;">Desafío 3</div>
                <div class="seccion" style="--i:4;">Desafío 4</div>
                <div class="seccion" style="--i:5;">Desafío 5</div>
                <div class="seccion" style="--i:6;">Desafío 6</div>
                <div class="seccion" style="--i:7;">Desafío 7</div>
                <div class="seccion" style="--i:8;">Desafío 8</div>
            </div>
            <div class="puntero"></div>
        </div>
        <button id="girar">¡Girar Ruleta!</button>
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
